[build]
  command = "npm ci && npm --prefix dashboard ci && npm --prefix dashboard run build"
  publish = "dashboard/dist/dashboard/browser"

[build.environment]
  NODE_VERSION = "20.19.0"
  SECRETS_SCAN_OMIT_KEYS = "LOG_LEVEL,TIMEZONE,KALSHI_API_BASE_URL,ESTIMATED_WIN_PROBABILITY,FEE_BUFFER,POST80_MAX_YES_PRICE,STATE_FILE"
  SECRETS_SCAN_OMIT_PATHS = ".env.example,README.md,dashboard/package-lock.json,dashboard/dist"
  # These values are ordinary app config, not secrets. Netlify secret scanning
  # flags them because their values also appear in the built frontend bundle.

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/monitor/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
