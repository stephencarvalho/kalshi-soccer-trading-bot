[build]
  command = "npm --prefix dashboard ci && npm --prefix dashboard run build"
  publish = "dashboard/dist/dashboard/browser"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/monitor/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
